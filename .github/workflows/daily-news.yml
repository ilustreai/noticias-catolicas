name: Daily Catholic News

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/build-html.mjs'
      - 'scripts/generate-daily-selection.mjs'
      - 'scripts/lib.mjs'
      - 'scripts/refresh-liturgical-cache.mjs'
      - 'scripts/validate-selection.mjs'
      - 'data/liturgical-calendar-2026.json'
      - 'data/news-sources.json'
      - 'data/curated-saints.json'
      - 'template/noticias-catolicas.template.html'
      - '.github/workflows/daily-news.yml'
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm test
      - run: node scripts/refresh-liturgical-cache.mjs
        continue-on-error: true
      - run: npm run generate
      - run: npm run validate
      - run: |
          node scripts/build-html.mjs
          cp -f public/index.html index.html
          cp -rf public/assets/ assets/ 2>/dev/null; true
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/ data/daily-selection.json index.html public/
          git diff --cached --quiet || git commit -m "chore: publish edicao $(date -u +%Y-%m-%d)"
          git push
        shell: bash
      - name: Verify public site
        shell: bash
        run: |
          for attempt in {1..12}; do
            html="$(curl -fsSL https://noticias.ilustreai.com.br/ || true)"
            count="$(grep -o 'class="news-item' <<< "$html" | wc -l)"
            if grep -q 'class="hero-title"' <<< "$html" && [ "$count" -ge 5 ]; then
              exit 0
            fi
            echo "Waiting for public site deployment... attempt ${attempt}/12, news items: ${count}"
            sleep 30
          done
          echo "Public site verification failed after waiting for deployment."
          exit 1
      - name: Notify Telegram on failure
        if: failure()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured; skipping notification."
            exit 0
          fi
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=$(printf 'Falha na edicao: %s\nRepositorio: %s\nBranch: %s\nCommit: %s\nRun: %s/%s/actions/runs/%s' "$GITHUB_WORKFLOW" "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME" "$GITHUB_SHA" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")" \
            || echo "Telegram notification failed; check TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID secrets."
