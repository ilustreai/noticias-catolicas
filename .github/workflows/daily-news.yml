name: Daily Catholic News

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '50 7 * * *'

permissions:
  contents: write

concurrency:
  group: daily-catholic-news
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate tests
        run: npm test

      - name: Validate daily selection
        run: npm run validate

      - name: Build static page at repository root
        run: node scripts/build-html.mjs data/daily-selection.json .

      - name: Commit generated static page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html *.html
          git diff --cached --quiet || git commit -m "chore: publish daily static page"
          git push
