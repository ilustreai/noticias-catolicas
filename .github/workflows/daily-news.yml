name: Daily Catholic News

on:
  workflow_dispatch:
    inputs:
      edition:
        description: 'Edition number (1 or 2)'
        required: true
        default: '1'
  push:
    branches:
      - main
    paths:
      - 'scripts/build-html.mjs'
      - 'scripts/generate-daily-selection.mjs'
      - 'scripts/lib.mjs'
      - 'scripts/refresh-liturgical-cache.mjs'
      - 'scripts/validate-selection.mjs'
      - 'data/liturgical-calendar-2026.json'
      - 'data/news-sources.json'
      - 'data/curated-saints.json'
      - 'template/noticias-catolicas.template.html'
      - '.github/workflows/daily-news.yml'
  schedule:
    - cron: '0 6 * * *'
    - cron: '30 14 * * *'

permissions:
  contents: write
  issues: write

concurrency:
  group: catholic-news-publish-unblock
  cancel-in-progress: true

jobs:
  edition1:
    if: (github.event_name == 'schedule' && (github.event.schedule == '0 6 * * *' || github.event.schedule == '1 3 * * *')) || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.edition == '1')
    runs-on: ubuntu-latest
    env:
      EDITION: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm test
      - run: node scripts/refresh-liturgical-cache.mjs
        continue-on-error: true
      - run: npm run generate
        env:
          EDITION: '1'
      - run: npm run validate
      - run: |
          node scripts/build-html.mjs data/daily-selection.json .
          cp -f index.html public/index.html
        env:
          EDITION: '1'
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily-selection.json index.html public/
          git diff --cached --quiet || git commit -m "chore: publish 1a edicao $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
      - name: Verify public site
        shell: bash
        run: |
          for attempt in {1..12}; do
            html="$(curl -fsSL https://noticias.ilustreai.com.br/ || true)"
            count="$(grep -o 'class="news-item' <<< "$html" | wc -l)"
            if grep -q 'class="hero-title"' <<< "$html" && [ "$count" -ge 5 ]; then
              exit 0
            fi
            echo "Waiting for public site deployment... attempt ${attempt}/12, news items: ${count}"
            sleep 30
          done
          echo "Public site verification failed after waiting for deployment."
          exit 1
      - name: Notify Telegram on failure
        if: failure()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured; skipping notification."
            exit 0
          fi
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=$(printf 'Falha na 1a edicao: %s\nRepositorio: %s\nBranch: %s\nCommit: %s\nRun: %s/%s/actions/runs/%s' "$GITHUB_WORKFLOW" "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME" "$GITHUB_SHA" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")" \
            || echo "Telegram notification failed; check TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID secrets."

  edition2:
    if: (github.event_name == 'schedule' && (github.event.schedule == '30 14 * * *' || github.event.schedule == '0 15 * * *')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.edition == '2')
    runs-on: ubuntu-latest
    env:
      EDITION: '2'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm test
      - run: npm run generate
        env:
          EDITION: '2'
      - run: npm run validate
      - run: |
          node scripts/build-html.mjs data/daily-selection.json .
          cp -f index.html public/index.html
        env:
          EDITION: '2'
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily-selection.json index.html public/
          git diff --cached --quiet || git commit -m "chore: publish 2a edicao $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
      - name: Notify Telegram on failure
        if: failure()
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured; skipping notification."
            exit 0
          fi
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=$(printf 'Falha na 2a edicao: %s\nRepositorio: %s\nBranch: %s\nCommit: %s\nRun: %s/%s/actions/runs/%s' "$GITHUB_WORKFLOW" "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME" "$GITHUB_SHA" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")" \
            || echo "Telegram notification failed; check TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID secrets."
