name: Daily Catholic News

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/build-html.mjs'
      - 'template/noticias-catolicas.template.html'
      - '.github/workflows/daily-news.yml'
  schedule:
    - cron: '0 7 * * *'

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-catholic-news
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate tests
        run: npm test

      - name: Generate daily selection
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: npm run generate

      - name: Validate daily selection
        run: npm run validate

      - name: Build static page at repository root
        run: node scripts/build-html.mjs data/daily-selection.json .

      - name: Commit generated selection and static page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily-selection.json index.html *.html
          git diff --cached --quiet || git commit -m "chore: publish daily catholic news"
          git push

      - name: Verify public site
        shell: bash
        run: |
          sleep 180
          html="$(curl -fsSL https://noticias.ilustreai.com.br/)"
          grep -q "A Igreja viva no mundo de hoje" <<< "$html"
          count="$(grep -o 'class="news-item' <<< "$html" | wc -l)"
          test "$count" -ge 5
